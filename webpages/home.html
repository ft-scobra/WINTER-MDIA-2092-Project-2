<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/dheereshag/coloured-icons@1.9.7/app/ci.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@300..900&family=IM+Fell+English:ital@0;1&display=swap"
        rel="stylesheet">
    <title>NAME | Homepage</title>
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <main class="main-content">
        <!-- Above the fold -->
        <div class="above-the-fold">
        </div>
        <div class="below-the-fold">
            <!-- Hero Banner -->
            <div class="hero-banner">
                <!-- Image Carousel -->
                <div class="carousel-container">
                    <!-- Image 1 -->
                    <a href="./about.html">
                        <div class="mySlides fade">
                            <div class="numbertext">1 / 3</div>
                            <img src="https://picsum.photos/seed/a/1920/1080" alt="Image Carousel"
                                class="carousel-image">
                        </div>
                    </a>
                    <!-- Image 2 -->
                    <a href="./playboi-carti.html">
                        <div class="mySlides fade">
                            <div class="numbertext">2 / 3</div>
                            <img src="https://picsum.photos/seed/b/1920/1080" alt="Image Carousel"
                                class="carousel-image">
                        </div>
                    </a>
                    <!-- Image 3 -->
                    <a href="./tyler-the-creator.html">
                        <div class="mySlides fade">
                            <div class="numbertext">3 / 3</div>
                            <img src="https://picsum.photos/seed/c/1920/1080" alt="Image Carousel"
                                class="carousel-image">
                        </div>
                    </a>
                    <!-- Next and Previous Buttons -->
                    <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
                    <a class="next" onclick="plusSlides(1)">&#10095;</a>
                </div>

                <!-- Indicator -->
                <div class="carousel-indicator">
                    <span class="dot" onclick="currentSlide(1)"></span>
                    <span class="dot" onclick="currentSlide(2)"></span>
                    <span class="dot" onclick="currentSlide(3)"></span>
                </div>
            </div>
            <div class="content-section">
                <h1>Heading</h1>
                CONTENT
            </div>
        </div>
    </main>
    <footer>
        <div class="footer-contact">
            <h4>Email</h4>
            <span class="footer-email">
                <a href="mailto:example@example.com">example@example.com</a>
            </span>
        </div>
        <div class="footer-social-tray">
            <div class="social-icon">
                <a href="#" class="social-link">
                    <i class="ci ci-instagram ci-2x"></i>
                </a>
                <a href="#" class="social-link">
                    <i class="ci ci-facebook ci-2x"></i>
                </a>
            </div>
        </div>
        <div class="copyright">
            <span>&copy; 2026 | <a href="../LICENSE">MIT LICENSE</a></span>
        </div>
    </footer>
</body>
<script defer src="../scripts/scripts.js"></script>

</html>
